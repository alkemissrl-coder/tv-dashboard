name: Sync Metal CSV to EUR per gram

permissions:
  contents: write

on:
  schedule:
    - cron: "20 23 * * *"   # ogni giorno alle 23:20 UTC
  workflow_dispatch:

concurrency:
  group: sync-metal-csv
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update gold and silver history
        env:
          PYTHONUNBUFFERED: "1"
          TZ: UTC
        run: |
          python - <<'PY'
          import csv
          import html
          import re
          import time
          import urllib.request
          from datetime import datetime
          from decimal import Decimal, ROUND_HALF_UP
          from pathlib import Path

          OZ_TO_G = Decimal("31.1035")

          URLS = {
              "gold": "https://stooq.com/q/?s=xaueur",
              "silver": "https://stooq.com/q/?s=xageur",
          }

          USER_AGENT = (
              "Mozilla/5.0 (X11; Linux x86_64) "
              "AppleWebKit/537.36 (KHTML, like Gecko) "
              "Chrome/123.0 Safari/537.36"
          )

          MONTHS = {
              "Jan": 1, "Feb": 2, "Mar": 3, "Apr": 4, "May": 5, "Jun": 6,
              "Jul": 7, "Aug": 8, "Sep": 9, "Oct": 10, "Nov": 11, "Dec": 12,
          }

          def fetch_text(url: str, retries: int = 4, base_delay: float = 2.0) -> str:
              last_error = None
              for attempt in range(1, retries + 1):
                  try:
                      req = urllib.request.Request(
                          url,
                          headers={
                              "User-Agent": USER_AGENT,
                              "Accept": "text/html,text/plain;q=0.9,*/*;q=0.8",
                              "Accept-Language": "en-US,en;q=0.9",
                              "Cache-Control": "no-cache",
                              "Pragma": "no-cache",
                          },
                      )
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          if resp.status != 200:
                              raise RuntimeError(f"HTTP {resp.status}")
                          data = resp.read().decode("utf-8", errors="replace")
                          if not data or not data.strip():
                              raise RuntimeError("empty response")
                          return data
                  except Exception as e:
                      last_error = e
                      if attempt < retries:
                          time.sleep(base_delay * attempt)
              raise RuntimeError(f"Download failed for {url}: {last_error}")

          def strip_tags(text: str) -> str:
              text = re.sub(r"<script\b[^>]*>.*?</script>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<style\b[^>]*>.*?</style>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<[^>]+>", " ", text)
              text = html.unescape(text)
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def parse_decimal(value: str) -> Decimal:
              value = value.strip()
              value = re.sub(r"[^0-9,.\-]", "", value)
              if not value:
                  raise ValueError("empty numeric value")

              if "," in value and "." in value:
                  if value.rfind(".") > value.rfind(","):
                      value = value.replace(",", "")
                  else:
                      value = value.replace(".", "").replace(",", ".")
              else:
                  value = value.replace(",", ".")

              return Decimal(value)

          def parse_quote_date(date_text: str) -> str:
              # es. "30 Mar"
              m = re.fullmatch(r"(\d{1,2})\s+([A-Z][a-z]{2})", date_text.strip())
              if not m:
                  raise ValueError(f"invalid date text: {date_text}")
              day = int(m.group(1))
              month = MONTHS[m.group(2)]

              now = datetime.utcnow()
              year = now.year

              # Se a inizio gennaio troviamo un mese futuro, assume anno precedente
              if month > now.month + 1:
                  year -= 1

              return datetime(year, month, day).strftime("%Y-%m-%d")

          def extract_quote(html_text: str, symbol: str) -> tuple[str, Decimal]:
              text = strip_tags(html_text)

              # Pattern tipico pubblico visto su Stooq:
              # Gold (ozt) / Euro (XAUEUR). 30 Mar, 1:13 3898.17 -6.26 (-0.16%).
              # Silver (ozt) / Euro (XAGEUR). 27 Mar, 22:00 60.6202 +1.3732 (+2.32%).
              pattern = re.compile(
                  rf"\({symbol}\)\.\s*(\d{{1,2}}\s+[A-Z][a-z]{{2}}),\s*\d{{1,2}}:\d{{2}}\s+(-?\d+(?:[.,]\d+)?)"
              )

              m = pattern.search(text)
              if not m:
                  raise RuntimeError(f"{symbol}: quote pattern not found")

              date_text = m.group(1)
              value_text = m.group(2)

              quote_date = parse_quote_date(date_text)
              quote_value = parse_decimal(value_text)
              return quote_date, quote_value

          def read_local_csv(path: str) -> list[dict[str, str]]:
              p = Path(path)
              if not p.exists():
                  return []
              with p.open("r", newline="", encoding="utf-8") as f:
                  rows = list(csv.DictReader(f))
              for row in rows:
                  if "date" not in row or "eur_per_g" not in row:
                      raise RuntimeError(f"{path}: invalid CSV header")
              return rows

          def write_local_csv(path: str, rows: list[dict[str, str]]) -> None:
              tmp = Path(path + ".tmp")
              with tmp.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=["date", "eur_per_g"])
                  writer.writeheader()
                  writer.writerows(rows)
              tmp.replace(path)

          def upsert_value(rows: list[dict[str, str]], date_str: str, value: Decimal) -> None:
              value_str = str(value)
              for row in rows:
                  if row["date"] == date_str:
                      row["eur_per_g"] = value_str
                      break
              else:
                  rows.append({"date": date_str, "eur_per_g": value_str})
              rows.sort(key=lambda r: r["date"])

          print("Downloading data from Stooq...")

          gold_html = fetch_text(URLS["gold"])
          silver_html = fetch_text(URLS["silver"])

          gold_date, gold_eur_per_oz = extract_quote(gold_html, "XAUEUR")
          silver_date, silver_eur_per_oz = extract_quote(silver_html, "XAGEUR")

          gold_eur_per_g = (gold_eur_per_oz / OZ_TO_G).quantize(
              Decimal("0.0001"), rounding=ROUND_HALF_UP
          )
          silver_eur_per_g = (silver_eur_per_oz / OZ_TO_G).quantize(
              Decimal("0.0001"), rounding=ROUND_HALF_UP
          )

          print(f"Gold date: {gold_date}")
          print(f"Gold EUR/oz: {gold_eur_per_oz} -> EUR/g: {gold_eur_per_g}")

          print(f"Silver date: {silver_date}")
          print(f"Silver EUR/oz: {silver_eur_per_oz} -> EUR/g: {silver_eur_per_g}")

          gold_rows = read_local_csv("gold_history.csv")
          silver_rows = read_local_csv("silver_history.csv")

          upsert_value(gold_rows, gold_date, gold_eur_per_g)
          upsert_value(silver_rows, silver_date, silver_eur_per_g)

          write_local_csv("gold_history.csv", gold_rows)
          write_local_csv("silver_history.csv", silver_rows)

          print("CSV updated successfully.")
          PY

      - name: Show latest rows
        run: |
          echo '--- gold_history.csv ---'
          tail -n 5 gold_history.csv || true
          echo '--- silver_history.csv ---'
          tail -n 5 silver_history.csv || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gold_history.csv silver_history.csv
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update CSV $(date -u +%F' '%T'Z')"
            git push
          fi
