name: "Sync Stooq CSV to EUR/g"

permissions:
  contents: write

on:
  schedule:
    - cron: "10 * * * *"   # ogni ora al minuto 10 (UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Warm-up cookie su stooq.com
        run: |
          set -euo pipefail
          curl -fsSL -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Encoding: gzip, deflate" \
            -H "Connection: keep-alive" \
            -c cookies.txt https://stooq.com/ -o /dev/null
          echo "Cookie warmup completato"

      - name: Scarica GOLD XAU/EUR (daily) con retry migliorato
        run: |
          set -euo pipefail
          for attempt in {1..5}; do
            echo "Tentativo $attempt/5 per GOLD..."
            if curl -fL --max-time 30 --compressed \
              -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Accept: text/csv" \
              -H "Accept-Encoding: gzip, deflate" \
              -H "Connection: keep-alive" \
              -b cookies.txt -c cookies.txt \
              "https://stooq.com/q/d/l/?s=xaueur&i=d" -o raw_gold.csv 2>/dev/null && \
              [ -s raw_gold.csv ] && [ $(wc -l < raw_gold.csv) -gt 1 ]; then
              echo "Gold CSV scaricato con successo"
              head -n 2 raw_gold.csv
              break
            else
              echo "Tentativo $attempt fallito"
              [ $attempt -lt 5 ] && sleep 5
            fi
          done
          
          if [ ! -s raw_gold.csv ] || [ $(wc -l < raw_gold.csv) -le 1 ]; then
            echo "ERRORE: Gold CSV vuoto o non scaricato dopo 5 tentativi"
            exit 1
          fi

      - name: Scarica SILVER XAG/EUR (daily) con retry migliorato
        run: |
          set -euo pipefail
          for attempt in {1..5}; do
            echo "Tentativo $attempt/5 per SILVER..."
            if curl -fL --max-time 30 --compressed \
              -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Accept: text/csv" \
              -H "Accept-Encoding: gzip, deflate" \
              -H "Connection: keep-alive" \
              -b cookies.txt -c cookies.txt \
              "https://stooq.com/q/d/l/?s=xageur&i=d" -o raw_silver.csv 2>/dev/null && \
              [ -s raw_silver.csv ] && [ $(wc -l < raw_silver.csv) -gt 1 ]; then
              echo "Silver CSV scaricato con successo"
              head -n 2 raw_silver.csv
              break
            else
              echo "Tentativo $attempt fallito"
              [ $attempt -lt 5 ] && sleep 5
            fi
          done
          
          if [ ! -s raw_silver.csv ] || [ $(wc -l < raw_silver.csv) -le 1 ]; then
            echo "ERRORE: Silver CSV vuoto o non scaricato dopo 5 tentativi"
            exit 1
          fi

      - name: Converti €/oz in €/g e normalizza
        run: |
          python - <<'PY'
          import csv, unicodedata
          from decimal import Decimal, ROUND_HALF_UP

          OZ_TO_G = Decimal('31.1035')

          def norm(s:str)->str:
              s = s.strip().lower()
              s = unicodedata.normalize('NFKD', s)
              return ''.join(ch for ch in s if not unicodedata.combining(ch))

          def convert(src, dst):
              with open(src, 'r', encoding='utf-8-sig', newline='') as f:
                  sample = f.read(2048); f.seek(0)
                  try:
                      dialect = csv.Sniffer().sniff(sample, delimiters=',;')
                  except Exception:
                      dialect = csv.excel
                  reader = csv.reader(f, dialect)
                  rows = [r for r in reader if any(cell.strip() for cell in r)]
              if not rows:
                  raise SystemExit(f"Nessun dato in {src}")

              header = [h.lstrip('\ufeff') for h in rows[0]]
              data_rows = rows[1:]
              lower = [norm(h) for h in header]

              date_idx = None
              for cand in ('date','data'):
                  if cand in lower:
                      date_idx = lower.index(cand); break
              if date_idx is None: date_idx = 0

              close_idx = None
              for cand in ('close','zamkniecie','c','last','price'):
                  if cand in lower:
                      close_idx = lower.index(cand); break
              if close_idx is None: close_idx = len(header)-1

              out=[]
              for row in data_rows:
                  if len(row) <= max(date_idx, close_idx): continue
                  d = row[date_idx].strip()
                  raw = row[close_idx].strip().replace(',', '.')
                  if not d or not raw: continue
                  try:
                      v = Decimal(raw)
                  except Exception:
                      continue
                  eur_per_g = (v / OZ_TO_G).quantize(Decimal('0.0001'), rounding=ROUND_HALF_UP)
                  out.append((d, str(eur_per_g)))

              out.sort(key=lambda x: x[0])

              with open(dst, 'w', newline='') as f2:
                  w = csv.writer(f2)
                  w.writerow(['date','eur_per_g'])
                  w.writerows(out)

          convert('raw_gold.csv','gold_history.csv')
          convert('raw_silver.csv','silver_history.csv')
          PY

      - name: Mostra ultime righe (debug)
        run: |
          echo '--- gold_history.csv ---'
          tail -n 5 gold_history.csv || true
          echo '--- silver_history.csv ---'
          tail -n 5 silver_history.csv || true

      - name: Commit & push se ci sono cambiamenti
        run: |
          git config user.name  "csv-bot"
          git config user.email "csv-bot@users.noreply.github.com"
          git add gold_history.csv silver_history.csv || true
          if git diff --cached --quiet; then
            echo "Nessun cambiamento"
          else
            git commit -m "Auto update CSV $(date -u +%F' '%T'Z')"
            git push
          fi
        
