name: "Sync Stooq CSV to EUR/g"

permissions:
  contents: write

on:
  schedule:
    - cron: "10 * * * *"   # ogni ora al minuto 10 (UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Scarica quotazioni da Stooq
        run: |
          python - <<'PY'
          import asyncio
          from playwright.async_api import async_playwright
          import csv
          from datetime import datetime
          from decimal import Decimal, ROUND_HALF_UP

          OZ_TO_G = Decimal('31.1035')

          async def estrai_valore(url, nome):
              """Estrae il valore dalla pagina Stooq usando Playwright"""
              try:
                  async with async_playwright() as p:
                      browser = await p.chromium.launch()
                      page = await browser.new_page()
                      await page.goto(url, wait_until='networkidle')
                      
                      # Attendi lo span con la quotazione
                      await page.wait_for_selector('span.qquote_last', timeout=5000)
                      valore_text = await page.text_content('span.qquote_last')
                      
                      await browser.close()
                      
                      if valore_text:
                          valore = Decimal(valore_text.strip().replace(',', '.'))
                          print(f"{nome}: {valore}")
                          return valore
                      else:
                          print(f"ERRORE {nome}: testo vuoto")
                          return None
              except Exception as e:
                  print(f"ERRORE {nome}: {e}")
                  return None

          async def main():
              # Estrai i valori da Stooq
              tasso_usd_eur = await estrai_valore('https://stooq.com/q/?s=usdeur', 'Tasso USD/EUR')
              prezzo_oro_usd = await estrai_valore('https://stooq.com/q/?s=xauusd', 'Oro USD/oz')
              prezzo_argento_usd = await estrai_valore('https://stooq.com/q/?s=xagusd&c=2y', 'Argento USD/oz')

              if not (tasso_usd_eur and prezzo_oro_usd and prezzo_argento_usd):
                  raise SystemExit("Impossibile estrarre tutte le quotazioni")

              # Converti: USD/oz → EUR/oz → EUR/g
              prezzo_oro_eur_per_g = (prezzo_oro_usd * tasso_usd_eur / OZ_TO_G).quantize(Decimal('0.0001'), rounding=ROUND_HALF_UP)
              prezzo_argento_eur_per_g = (prezzo_argento_usd * tasso_usd_eur / OZ_TO_G).quantize(Decimal('0.0001'), rounding=ROUND_HALF_UP)

              data_odierna = datetime.utcnow().strftime('%Y-%m-%d')
              print(f"\nConversioni:")
              print(f"Oro: ${prezzo_oro_usd}/oz × {tasso_usd_eur} = €{prezzo_oro_eur_per_g}/g")
              print(f"Argento: ${prezzo_argento_usd}/oz × {tasso_usd_eur} = €{prezzo_argento_eur_per_g}/g")

              # Leggi i dati storici esistenti
              try:
                  with open('gold_history.csv', 'r', newline='') as f:
                      reader = csv.DictReader(f)
                      oro_storico = list(reader) if reader else []
              except FileNotFoundError:
                  oro_storico = []

              try:
                  with open('silver_history.csv', 'r', newline='') as f:
                      reader = csv.DictReader(f)
                      argento_storico = list(reader) if reader else []
              except FileNotFoundError:
                  argento_storico = []

              # Aggiungi la nuova quotazione se non esiste già per oggi
              oro_date_exist = any(row['date'] == data_odierna for row in oro_storico)
              argento_date_exist = any(row['date'] == data_odierna for row in argento_storico)

              if not oro_date_exist:
                  oro_storico.append({'date': data_odierna, 'eur_per_g': str(prezzo_oro_eur_per_g)})
                  print(f"✓ Aggiunto oro per {data_odierna}")
              else:
                  print(f"✗ Oro già presente per {data_odierna}")

              if not argento_date_exist:
                  argento_storico.append({'date': data_odierna, 'eur_per_g': str(prezzo_argento_eur_per_g)})
                  print(f"✓ Aggiunto argento per {data_odierna}")
              else:
                  print(f"✗ Argento già presente per {data_odierna}")

              # Ordina per data
              oro_storico.sort(key=lambda x: x['date'])
              argento_storico.sort(key=lambda x: x['date'])

              # Scrivi i file
              with open('gold_history.csv', 'w', newline='') as f:
                  writer = csv.DictWriter(f, fieldnames=['date', 'eur_per_g'])
                  writer.writeheader()
                  writer.writerows(oro_storico)

              with open('silver_history.csv', 'w', newline='') as f:
                  writer = csv.DictWriter(f, fieldnames=['date', 'eur_per_g'])
                  writer.writeheader()
                  writer.writerows(argento_storico)

              print("\n✓ File CSV aggiornati con successo")

          asyncio.run(main())
          PY

      - name: Mostra ultime righe (debug)
        run: |
          echo '--- gold_history.csv ---'
          tail -n 5 gold_history.csv || true
          echo '--- silver_history.csv ---'
          tail -n 5 silver_history.csv || true

      - name: Commit & push se ci sono cambiamenti
        run: |
          git config user.name  "csv-bot"
          git config user.email "csv-bot@users.noreply.github.com"
          git add gold_history.csv silver_history.csv || true
          if git diff --cached --quiet; then
            echo "Nessun cambiamento"
          else
            git commit -m "Auto update CSV $(date -u +%F' '%T'Z')"
            git push
          fi
