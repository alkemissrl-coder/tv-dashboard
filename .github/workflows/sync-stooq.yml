name: Sync Metal CSV to EUR per gram

permissions:
  contents: write

on:
  schedule:
    - cron: "20 23 * * *"   # ogni giorno alle 23:20 UTC
  workflow_dispatch:

concurrency:
  group: sync-metal-csv
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update gold and silver history
        env:
          PYTHONUNBUFFERED: "1"
          TZ: UTC
        run: |
          python - <<'PY'
          import csv
          import html as html_lib
          import io
          import re
          import time
          import urllib.request
          from decimal import Decimal, ROUND_HALF_UP, getcontext
          from pathlib import Path

          getcontext().prec = 28
          OZ_TO_G = Decimal("31.1035")

          URLS = {
              "eurusd_csv": "https://stooq.com/q/d/l/?s=eurusd&i=d",
              "xauusd_csv": "https://stooq.com/q/d/l/?s=xauusd&i=d",
              "xagusd_csv": "https://stooq.com/q/d/l/?s=xagusd&i=d",

              "eurusd_html": "https://stooq.com/q/d/?s=eurusd",
              "xauusd_html": "https://stooq.com/q/d/?s=xauusd",
              "xagusd_html": "https://stooq.com/q/d/?s=xagusd",
          }

          USER_AGENT = (
              "Mozilla/5.0 (X11; Linux x86_64) "
              "AppleWebKit/537.36 (KHTML, like Gecko) "
              "Chrome/123.0 Safari/537.36"
          )

          def fetch_text(url: str, retries: int = 4, base_delay: float = 2.0) -> str:
              last_error = None
              for attempt in range(1, retries + 1):
                  try:
                      req = urllib.request.Request(
                          url,
                          headers={
                              "User-Agent": USER_AGENT,
                              "Accept": "text/csv,text/html,text/plain;q=0.9,*/*;q=0.8",
                              "Accept-Language": "en-US,en;q=0.9",
                              "Cache-Control": "no-cache",
                              "Pragma": "no-cache",
                          },
                      )
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          if resp.status != 200:
                              raise RuntimeError(f"HTTP {resp.status}")
                          data = resp.read().decode("utf-8", errors="replace")
                          if not data or not data.strip():
                              raise RuntimeError("empty response")
                          return data
                  except Exception as e:
                      last_error = e
                      if attempt < retries:
                          time.sleep(base_delay * attempt)
              raise RuntimeError(f"Download failed for {url}: {last_error}")

          def parse_decimal(value: str) -> Decimal:
              value = value.strip()
              value = re.sub(r"[^0-9,.\-]", "", value)
              if not value:
                  raise ValueError("empty numeric value")

              if "," in value and "." in value:
                  if value.rfind(".") > value.rfind(","):
                      value = value.replace(",", "")
                  else:
                      value = value.replace(".", "").replace(",", ".")
              else:
                  value = value.replace(",", ".")

              return Decimal(value)

          def strip_tags(text: str) -> str:
              text = re.sub(r"<[^>]+>", " ", text)
              text = html_lib.unescape(text)
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def load_series_from_csv(csv_text: str, label: str) -> dict[str, Decimal]:
              reader = csv.DictReader(io.StringIO(csv_text))
              required = {"Date", "Close"}
              if not reader.fieldnames or not required.issubset(set(reader.fieldnames)):
                  raise RuntimeError(f"{label}: CSV format unexpected: {reader.fieldnames}")

              out: dict[str, Decimal] = {}
              for row in reader:
                  date_str = (row.get("Date") or "").strip()
                  close_str = (row.get("Close") or "").strip()
                  if not date_str or not close_str:
                      continue
                  try:
                      out[date_str] = parse_decimal(close_str)
                  except Exception:
                      continue

              if not out:
                  raise RuntimeError(f"{label}: no valid rows in CSV")
              return out

          def load_series_from_html(html_text: str, label: str) -> dict[str, Decimal]:
              out: dict[str, Decimal] = {}

              rows = re.findall(r"<tr[^>]*>(.*?)</tr>", html_text, flags=re.I | re.S)
              for row_html in rows:
                  cells_html = re.findall(r"<t[dh][^>]*>(.*?)</t[dh]>", row_html, flags=re.I | re.S)
                  if not cells_html:
                      continue

                  cells = [strip_tags(c) for c in cells_html]
                  if not cells:
                      continue

                  date_str = None
                  nums = []

                  for cell in cells:
                      cell = cell.strip()
                      if re.fullmatch(r"\d{4}-\d{2}-\d{2}", cell):
                          date_str = cell
                      else:
                          try:
                              nums.append(parse_decimal(cell))
                          except Exception:
                              pass

                  if date_str and nums:
                      out[date_str] = nums[-1]

              if not out:
                  raise RuntimeError(f"{label}: no valid rows in HTML table")
              return out

          def load_series_with_fallback(csv_url: str, html_url: str, label: str) -> dict[str, Decimal]:
              try:
                  text = fetch_text(csv_url)
                  series = load_series_from_csv(text, label)
                  print(f"{label}: loaded from CSV")
                  return series
              except Exception as e:
                  print(f"{label}: CSV failed -> {e}")
                  html_text = fetch_text(html_url)
                  series = load_series_from_html(html_text, label)
                  print(f"{label}: loaded from HTML fallback")
                  return series

          def latest_common_date(*series_dicts: dict[str, Decimal]) -> str:
              common = set(series_dicts[0].keys())
              for s in series_dicts[1:]:
                  common &= set(s.keys())
              if not common:
                  raise RuntimeError("No common date across series")
              return max(common)

          def read_local_csv(path: str) -> list[dict[str, str]]:
              p = Path(path)
              if not p.exists():
                  return []
              with p.open("r", newline="", encoding="utf-8") as f:
                  rows = list(csv.DictReader(f))
              for row in rows:
                  if "date" not in row or "eur_per_g" not in row:
                      raise RuntimeError(f"{path}: invalid CSV header")
              return rows

          def write_local_csv(path: str, rows: list[dict[str, str]]) -> None:
              tmp = Path(path + ".tmp")
              with tmp.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=["date", "eur_per_g"])
                  writer.writeheader()
                  writer.writerows(rows)
              tmp.replace(path)

          def upsert_value(rows: list[dict[str, str]], date_str: str, value: Decimal) -> None:
              value_str = str(value)
              for row in rows:
                  if row["date"] == date_str:
                      row["eur_per_g"] = value_str
                      break
              else:
                  rows.append({"date": date_str, "eur_per_g": value_str})
              rows.sort(key=lambda r: r["date"])

          print("Downloading data from Stooq...")

          eurusd = load_series_with_fallback(URLS["eurusd_csv"], URLS["eurusd_html"], "EURUSD")
          gold = load_series_with_fallback(URLS["xauusd_csv"], URLS["xauusd_html"], "XAUUSD")
          silver = load_series_with_fallback(URLS["xagusd_csv"], URLS["xagusd_html"], "XAGUSD")

          quote_date = latest_common_date(eurusd, gold, silver)

          eur_usd = eurusd[quote_date]
          usd_eur = Decimal("1") / eur_usd

          gold_usd_oz = gold[quote_date]
          silver_usd_oz = silver[quote_date]

          gold_eur_g = (gold_usd_oz * usd_eur / OZ_TO_G).quantize(
              Decimal("0.0001"), rounding=ROUND_HALF_UP
          )
          silver_eur_g = (silver_usd_oz * usd_eur / OZ_TO_G).quantize(
              Decimal("0.0001"), rounding=ROUND_HALF_UP
          )

          print(f"Date: {quote_date}")
          print(f"EUR/USD: {eur_usd} -> USD/EUR: {usd_eur}")
          print(f"Gold EUR/g: {gold_eur_g}")
          print(f"Silver EUR/g: {silver_eur_g}")

          gold_rows = read_local_csv("gold_history.csv")
          silver_rows = read_local_csv("silver_history.csv")

          upsert_value(gold_rows, quote_date, gold_eur_g)
          upsert_value(silver_rows, quote_date, silver_eur_g)

          write_local_csv("gold_history.csv", gold_rows)
          write_local_csv("silver_history.csv", silver_rows)

          print("CSV updated successfully.")
          PY

      - name: Show latest rows
        run: |
          echo '--- gold_history.csv ---'
          tail -n 5 gold_history.csv || true
          echo '--- silver_history.csv ---'
          tail -n 5 silver_history.csv || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gold_history.csv silver_history.csv
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update CSV $(date -u +%F' '%T'Z')"
            git push
          fi
