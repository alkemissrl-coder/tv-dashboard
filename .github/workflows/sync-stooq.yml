name: Sync Metal CSV to EUR per gram

permissions:
  contents: write

on:
  schedule:
    - cron: "20 23 * * *"
  workflow_dispatch:

concurrency:
  group: sync-metal-csv
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update gold and silver history
        env:
          PYTHONUNBUFFERED: "1"
          TZ: UTC
        run: |
          python - <<'PY'
          import csv
          import io
          import time
          import urllib.request
          from decimal import Decimal, ROUND_HALF_UP
          from pathlib import Path

          OZ_TO_G = Decimal("31.1035")

          URLS = {
              "gold_csv": "https://stooq.com/q/l/?s=xaueur&f=sd2t2ohlc&h&e=csv",
              "silver_csv": "https://stooq.com/q/l/?s=xageur&f=sd2t2ohlc&h&e=csv",
          }

          USER_AGENT = (
              "Mozilla/5.0 (X11; Linux x86_64) "
              "AppleWebKit/537.36 (KHTML, like Gecko) "
              "Chrome/123.0 Safari/537.36"
          )

          def fetch_text(url: str, retries: int = 5, base_delay: float = 2.0) -> str:
              last_error = None
              for attempt in range(1, retries + 1):
                  try:
                      req = urllib.request.Request(
                          url,
                          headers={
                              "User-Agent": USER_AGENT,
                              "Accept": "text/csv,text/plain;q=0.9,*/*;q=0.8",
                              "Accept-Language": "en-US,en;q=0.9",
                              "Cache-Control": "no-cache",
                              "Pragma": "no-cache",
                          },
                      )
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          if resp.status != 200:
                              raise RuntimeError(f"HTTP {resp.status}")
                          data = resp.read().decode("utf-8", errors="replace")
                          if not data.strip():
                              raise RuntimeError("empty response")
                          return data
                  except Exception as e:
                      last_error = e
                      if attempt < retries:
                          time.sleep(base_delay * attempt)
              raise RuntimeError(f"Download failed for {url}: {last_error}")

          def parse_decimal(value: str) -> Decimal:
              value = value.strip().replace(",", "")
              return Decimal(value)

          def read_stooq_download(csv_text: str, label: str) -> tuple[str, Decimal]:
              reader = csv.DictReader(io.StringIO(csv_text))

              if not reader.fieldnames:
                  raise RuntimeError(f"{label}: CSV header mancante")

              headers = {h.strip().lower(): h for h in reader.fieldnames}

              required = ["date", "close"]
              missing = [name for name in required if name not in headers]
              if missing:
                  raise RuntimeError(
                      f"{label}: colonne mancanti {missing}, trovate: {reader.fieldnames}"
                  )

              rows = list(reader)
              if not rows:
                  raise RuntimeError(f"{label}: CSV vuoto")

              last_row = rows[-1]

              date_str = (last_row[headers["date"]] or "").strip()
              close_str = (last_row[headers["close"]] or "").strip()

              if not date_str:
                  raise RuntimeError(f"{label}: data mancante nell'ultima riga")
              if not close_str:
                  raise RuntimeError(f"{label}: close mancante nell'ultima riga")

              close_value = parse_decimal(close_str)
              return date_str, close_value

          def read_local_csv(path: str):
              p = Path(path)
              if not p.exists():
                  return []
              with p.open("r", newline="", encoding="utf-8") as f:
                  rows = list(csv.DictReader(f))
              for row in rows:
                  if "date" not in row or "eur_per_g" not in row:
                      raise RuntimeError(f"{path}: intestazione CSV non valida")
              return rows

          def write_local_csv(path: str, rows):
              tmp = Path(path + ".tmp")
              with tmp.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=["date", "eur_per_g"])
                  writer.writeheader()
                  writer.writerows(rows)
              tmp.replace(path)

          def upsert_value(rows, date_str: str, value: Decimal):
              value_str = str(value)
              for row in rows:
                  if row["date"] == date_str:
                      row["eur_per_g"] = value_str
                      break
              else:
                  rows.append({"date": date_str, "eur_per_g": value_str})
              rows.sort(key=lambda r: r["date"])

          print("Downloading Stooq CSV data...")

          try:
              gold_csv = fetch_text(URLS["gold_csv"])
              silver_csv = fetch_text(URLS["silver_csv"])

              gold_date, gold_eur_per_oz = read_stooq_download(gold_csv, "XAUEUR")
              silver_date, silver_eur_per_oz = read_stooq_download(silver_csv, "XAGEUR")
          except Exception as e:
              print(f"WARNING: download/parsing fallito, lascio i file invariati. Dettaglio: {e}")
              raise SystemExit(0)

          gold_eur_per_g = (gold_eur_per_oz / OZ_TO_G).quantize(
              Decimal("0.0001"), rounding=ROUND_HALF_UP
          )
          silver_eur_per_g = (silver_eur_per_oz / OZ_TO_G).quantize(
              Decimal("0.0001"), rounding=ROUND_HALF_UP
          )

          print(f"Gold date: {gold_date}")
          print(f"Gold EUR/oz: {gold_eur_per_oz} -> EUR/g: {gold_eur_per_g}")
          print(f"Silver date: {silver_date}")
          print(f"Silver EUR/oz: {silver_eur_per_oz} -> EUR/g: {silver_eur_per_g}")

          gold_rows = read_local_csv("gold_history.csv")
          silver_rows = read_local_csv("silver_history.csv")

          upsert_value(gold_rows, gold_date, gold_eur_per_g)
          upsert_value(silver_rows, silver_date, silver_eur_per_g)

          write_local_csv("gold_history.csv", gold_rows)
          write_local_csv("silver_history.csv", silver_rows)

          print("CSV updated successfully.")
          PY

      - name: Show latest rows
        run: |
          echo '--- gold_history.csv ---'
          tail -n 5 gold_history.csv || true
          echo '--- silver_history.csv ---'
          tail -n 5 silver_history.csv || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gold_history.csv silver_history.csv
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update CSV $(date -u +%F' '%T'Z')"
            git push
          fi
