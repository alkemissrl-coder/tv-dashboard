name: Debug Stooq Pages

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch and print Stooq HTML
        env:
          PYTHONUNBUFFERED: "1"
          TZ: UTC
        run: |
          python - <<'PY'
          import re
          import time
          import urllib.request

          URLS = {
              "XAUEUR": "https://stooq.com/q/?s=xaueur",
              "XAGEUR": "https://stooq.com/q/?s=xageur",
          }

          USER_AGENT = (
              "Mozilla/5.0 (X11; Linux x86_64) "
              "AppleWebKit/537.36 (KHTML, like Gecko) "
              "Chrome/123.0 Safari/537.36"
          )

          def fetch_text(url: str, retries: int = 5, base_delay: float = 2.0) -> str:
              last_error = None
              for attempt in range(1, retries + 1):
                  try:
                      req = urllib.request.Request(
                          url,
                          headers={
                              "User-Agent": USER_AGENT,
                              "Accept": "text/html,application/xhtml+xml,text/plain;q=0.9,*/*;q=0.8",
                              "Accept-Language": "en-US,en;q=0.9",
                              "Cache-Control": "no-cache",
                              "Pragma": "no-cache",
                          },
                      )
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          if resp.status != 200:
                              raise RuntimeError(f"HTTP {resp.status}")
                          data = resp.read().decode("utf-8", errors="replace")
                          if not data.strip():
                              raise RuntimeError("empty response")
                          return data
                  except Exception as e:
                      last_error = e
                      if attempt < retries:
                          time.sleep(base_delay * attempt)
              raise RuntimeError(f"Download failed for {url}: {last_error}")

          def print_debug(label: str, html_text: str) -> None:
              print(f"\n{'=' * 80}")
              print(f"{label} - HTML LENGTH: {len(html_text)}")
              print(f"{'=' * 80}")

              print(f"\n--- {label} RAW HTML START (first 5000 chars) ---")
              print(html_text[:5000])

              print(f"\n--- {label} RAW HTML END (last 3000 chars) ---")
              print(html_text[-3000:])

              low = html_text.lower()

              for needle in ["last", "date", "xaueur", "xageur", "qquote", "meta", "description"]:
                  idx = low.find(needle)
                  print(f"\n--- {label} SEARCH: {needle!r} -> index {idx} ---")
                  if idx != -1:
                      start = max(0, idx - 300)
                      end = min(len(html_text), idx + 700)
                      print(html_text[start:end])

              metas = re.findall(r"<meta[^>]+>", html_text, flags=re.I | re.S)
              print(f"\n--- {label} META TAG COUNT: {len(metas)} ---")
              for i, meta in enumerate(metas[:30], 1):
                  print(f"[META {i}] {meta}")

              title_match = re.search(r"<title[^>]*>(.*?)</title>", html_text, flags=re.I | re.S)
              print(f"\n--- {label} TITLE ---")
              print(title_match.group(1) if title_match else "NO TITLE FOUND")

          for label, url in URLS.items():
              print(f"\nFetching {label}: {url}")
              html_text = fetch_text(url)
              print_debug(label, html_text)
          PY
